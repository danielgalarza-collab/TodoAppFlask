services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: daniel
      POSTGRES_DB: todo_app
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daniel -d todo_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://daniel:daniel@db/todo_app
      FLASK_APP: run.py
      FLASK_ENV: development
    command: flask run --host=0.0.0.0

volumes:
  db_data:
